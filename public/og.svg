<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Dot matrix: 20px grid, 3px dot, matches /auth shader params -->
    <!-- 5x5 tile of 20px cells. Opacities mimic auth shader levels [0.3,0.5,0.8,1.0] scaled down. -->
    <pattern id="dots" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <circle cx="10"  cy="10"  r="1.5" fill="#fff" fill-opacity="0.12"/>
      <circle cx="30"  cy="10"  r="1.5" fill="#fff" fill-opacity="0.32"/>
      <circle cx="50"  cy="10"  r="1.5" fill="#fff" fill-opacity="0.18"/>
      <circle cx="70"  cy="10"  r="1.5" fill="#fff" fill-opacity="0.08"/>
      <circle cx="90"  cy="10"  r="1.5" fill="#fff" fill-opacity="0.22"/>
      <circle cx="10"  cy="30"  r="1.5" fill="#fff" fill-opacity="0.42"/>
      <circle cx="30"  cy="30"  r="1.5" fill="#fff" fill-opacity="0.10"/>
      <circle cx="50"  cy="30"  r="1.5" fill="#fff" fill-opacity="0.22"/>
      <circle cx="70"  cy="30"  r="1.5" fill="#fff" fill-opacity="0.55"/>
      <circle cx="90"  cy="30"  r="1.5" fill="#fff" fill-opacity="0.15"/>
      <circle cx="10"  cy="50"  r="1.5" fill="#fff" fill-opacity="0.20"/>
      <circle cx="30"  cy="50"  r="1.5" fill="#fff" fill-opacity="0.08"/>
      <circle cx="50"  cy="50"  r="1.5" fill="#fff" fill-opacity="0.35"/>
      <circle cx="70"  cy="50"  r="1.5" fill="#fff" fill-opacity="0.12"/>
      <circle cx="90"  cy="50"  r="1.5" fill="#fff" fill-opacity="0.28"/>
      <circle cx="10"  cy="70"  r="1.5" fill="#fff" fill-opacity="0.10"/>
      <circle cx="30"  cy="70"  r="1.5" fill="#fff" fill-opacity="0.48"/>
      <circle cx="50"  cy="70"  r="1.5" fill="#fff" fill-opacity="0.14"/>
      <circle cx="70"  cy="70"  r="1.5" fill="#fff" fill-opacity="0.22"/>
      <circle cx="90"  cy="70"  r="1.5" fill="#fff" fill-opacity="0.08"/>
      <circle cx="10"  cy="90"  r="1.5" fill="#fff" fill-opacity="0.26"/>
      <circle cx="30"  cy="90"  r="1.5" fill="#fff" fill-opacity="0.12"/>
      <circle cx="50"  cy="90"  r="1.5" fill="#fff" fill-opacity="0.38"/>
      <circle cx="70"  cy="90"  r="1.5" fill="#fff" fill-opacity="0.18"/>
      <circle cx="90"  cy="90"  r="1.5" fill="#fff" fill-opacity="0.30"/>
    </pattern>
    <!-- Radial fade: darker at center, dots visible at edges (like auth overlay) -->
    <radialGradient id="fade" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0a0a0a" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#0a0a0a" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a0a"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="1200" height="630" fill="#0a0a0a" fill-opacity="0.45"/>
  <rect width="1200" height="630" fill="url(#fade)"/>

  <!-- Logo: 3 white circles (matches AgineLogo / icon.svg) -->
  <g transform="translate(540 150)">
    <circle cx="60" cy="16" r="16" fill="#ffffff"/>
    <circle cx="16" cy="76" r="16" fill="#ffffff"/>
    <circle cx="104" cy="76" r="16" fill="#ffffff"/>
  </g>

  <!-- Brand -->
  <text x="600" y="360" text-anchor="middle"
        font-family="'PT Sans', 'Helvetica Neue', Arial, sans-serif"
        font-size="72" font-weight="700" fill="#ffffff"
        letter-spacing="-1.5">AGINE AI</text>

  <!-- Slogan -->
  <text x="600" y="430" text-anchor="middle"
        font-family="'PT Sans', 'Helvetica Neue', Arial, sans-serif"
        font-size="38" font-weight="400" fill="#ffffff" fill-opacity="0.72"
        letter-spacing="0.5">превращаем данные в решения</text>

  <!-- Hairline divider -->
  <line x1="540" y1="480" x2="660" y2="480" stroke="#ffffff" stroke-opacity="0.25" stroke-width="1"/>

  <!-- Subtext -->
  <text x="600" y="520" text-anchor="middle"
        font-family="'PT Sans', 'Helvetica Neue', Arial, sans-serif"
        font-size="22" font-weight="400" fill="#ffffff" fill-opacity="0.45"
        letter-spacing="2">CRM  ·  HEALTH SCORE  ·  PULSE</text>
</svg>

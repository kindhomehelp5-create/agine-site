<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AGINE AI — Вход</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  height: 100dvh;
  height: 100vh; /* fallback */
  overflow: hidden;
  background: #fff;
  color: #0a0a0a;
}

@supports (height: 100dvh) {
  body { height: 100dvh; }
}

/* ── Split layout ── */
.auth-split {
  display: flex;
  height: 100dvh;
  height: 100vh;
}

@supports (height: 100dvh) {
  .auth-split { height: 100dvh; }
}

/* ── Left: Dark + Animation ── */
.auth-left {
  flex: 1;
  background: #000;
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.auth-left canvas {
  position: absolute;
  inset: 0;
  width: 100% !important;
  height: 100% !important;
}

.auth-left-overlay {
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at center, rgba(0,0,0,0.85) 0%, transparent 70%);
  pointer-events: none;
  z-index: 1;
}

.auth-left-content {
  position: relative;
  z-index: 2;
  text-align: center;
  padding: 40px;
  opacity: 0;
  animation: authFadeIn 1s ease-out 0.6s forwards;
}

.auth-left-logo {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
  margin-bottom: 32px;
}

.auth-left-logo svg {
  width: 38px;
  height: 38px;
}

.auth-left-logo span {
  font-size: 22px;
  font-weight: 600;
  color: rgba(255,255,255,0.8);
  letter-spacing: 0.5px;
}

.auth-left-tagline {
  font-size: clamp(1.5rem, 2.5vw, 2rem);
  font-weight: 300;
  color: rgba(255,255,255,0.6);
  line-height: 1.3;
  letter-spacing: -0.01em;
}

.auth-left-tagline strong {
  color: #fff;
  font-weight: 600;
}

.auth-left-footer {
  position: absolute;
  bottom: 32px;
  left: 0;
  right: 0;
  text-align: center;
  z-index: 2;
  font-size: 12px;
  color: rgba(255,255,255,0.45);
}

/* ── Right: White form ── */
.auth-right {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 48px 40px;
  position: relative;
  background: #fff;
}


.auth-form-wrap {
  width: 100%;
  max-width: 380px;
  opacity: 0;
  animation: authSlideIn 0.7s ease-out 0.4s forwards;
}

.auth-form-title {
  font-size: 26px;
  font-weight: 700;
  color: #0a0a0a;
  margin-bottom: 6px;
  letter-spacing: -0.02em;
}

.auth-form-subtitle {
  font-size: 15px;
  color: #a3a3a3;
  margin-bottom: 32px;
}

/* ── Social buttons ── */
.auth-social-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 24px;
}

.auth-social-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 12px 16px;
  background: #fff;
  border: 1px solid #e5e5e5;
  border-radius: 12px;
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  font-weight: 500;
  color: #525252;
  cursor: pointer;
  transition: all 0.2s ease;
}

.auth-social-btn:hover {
  border-color: #0a0a0a;
  color: #0a0a0a;
}

.auth-social-btn:active {
  transform: scale(0.97);
}

.auth-social-btn svg {
  width: 18px;
  height: 18px;
  flex-shrink: 0;
}

/* ── Divider ── */
.auth-divider {
  display: flex;
  align-items: center;
  gap: 14px;
  margin: 24px 0;
}

.auth-divider-line {
  flex: 1;
  height: 1px;
  background: #e5e5e5;
}

.auth-divider-text {
  font-size: 12px;
  color: #a3a3a3;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* ── Email input ── */
.auth-field {
  margin-bottom: 16px;
}

.auth-label {
  display: block;
  font-size: 13px;
  font-weight: 500;
  color: #525252;
  margin-bottom: 6px;
}

.auth-input {
  width: 100%;
  padding: 12px 16px;
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  color: #0a0a0a;
  background: #fff;
  border: 1px solid #e5e5e5;
  border-radius: 12px;
  outline: none;
  transition: border-color 0.2s;
}

.auth-input:focus {
  border-color: #0a0a0a;
}

.auth-input::placeholder {
  color: #c4c4c4;
}

/* ── Primary button ── */
.auth-btn-primary {
  width: 100%;
  padding: 14px 24px;
  font-family: 'Inter', sans-serif;
  font-size: 15px;
  font-weight: 600;
  color: #fff;
  background: #0a0a0a;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.2s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  height: 48px;
  margin-top: 8px;
}

.auth-btn-primary:hover {
  background: #1a1a1a;
}

.auth-btn-primary:active {
  transform: scale(0.98);
}

.auth-btn-primary:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

/* ── Back button (top-left of right panel) ── */
.auth-back-btn {
  position: absolute;
  top: 28px;
  left: 28px;
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 13px;
  font-weight: 500;
  color: #a3a3a3;
  text-decoration: none;
  transition: color 0.2s;
  z-index: 2;
}

.auth-back-btn:hover {
  color: #0a0a0a;
}

.auth-back-btn svg {
  width: 18px;
  height: 18px;
  stroke: currentColor;
  fill: none;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
}

/* ── Test platform button ── */
.auth-btn-test {
  width: 100%;
  padding: 14px 24px;
  font-family: 'Inter', sans-serif;
  font-size: 15px;
  font-weight: 600;
  color: #525252;
  background: #f5f5f5;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.2s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  height: 48px;
  margin-top: 8px;
}

.auth-btn-test:hover {
  background: #ebebeb;
  color: #0a0a0a;
}

.auth-btn-test:active {
  transform: scale(0.98);
}

.auth-btn-test svg {
  width: 16px;
  height: 16px;
  stroke: currentColor;
  fill: none;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
  transition: transform 0.2s;
}

.auth-btn-test:hover svg {
  transform: translateX(3px);
}

/* ── Footer ── */
.auth-form-footer {
  margin-top: 32px;
  text-align: center;
  font-size: 12px;
  color: #8a8a8a;
  line-height: 1.6;
}

.auth-form-footer a {
  color: #737373;
  text-decoration: none;
}

.auth-form-footer a:hover {
  color: #0a0a0a;
}

/* ── Spinner ── */
.auth-spinner {
  width: 18px;
  height: 18px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: authSpin 0.6s linear infinite;
}

@keyframes authSpin {
  to { transform: rotate(360deg); }
}

/* ── Animations ── */
@keyframes authFadeIn {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes authSlideIn {
  from { opacity: 0; transform: translateX(20px); }
  to { opacity: 1; transform: translateX(0); }
}

/* ── Mobile: hide left, show only form ── */
@media (max-width: 768px) {
  .auth-left { display: none; }
  .auth-right {
    flex: 1;
    padding: 32px 24px;
  }
  .auth-mobile-logo {
    display: flex;
  }
}

.auth-mobile-logo {
  display: none;
  align-items: center;
  gap: 10px;
  margin-bottom: 32px;
}

.auth-mobile-logo svg {
  width: 24px;
  height: 24px;
}

.auth-mobile-logo span {
  font-size: 15px;
  font-weight: 600;
  color: #0a0a0a;
}

/* Focus-visible for keyboard navigation */
.auth-btn-primary:focus-visible,
.auth-btn-test:focus-visible,
.auth-social-btn:focus-visible,
.auth-back-btn:focus-visible,
.auth-input:focus-visible {
  outline: 2px solid #0a0a0a;
  outline-offset: 2px;
}

/* Reduced motion */
@media (prefers-reduced-motion: reduce) {
  .auth-form-wrap, .auth-left-content, .auth-left-tagline { animation: none !important; opacity: 1 !important; }
  .auth-spinner { animation-duration: 1.5s; }
}
</style>
</head>

<script>
/* ── Dot Matrix Shader ── */
(function() {
  try {
  var container = document.getElementById('authBg');
  var w = container.offsetWidth;
  var h = container.offsetHeight;

  var renderer = new THREE.WebGLRenderer({ alpha: true, antialias: false });
  renderer.setSize(w, h);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  container.insertBefore(renderer.domElement, container.firstChild);

  var scene = new THREE.Scene();
  var camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

  var vertexShader = [
    'varying vec2 vUv;',
    'void main() {',
    '  vUv = uv;',
    '  gl_Position = vec4(position, 1.0);',
    '}'
  ].join('\n');

  var fragmentShader = [
    'precision mediump float;',
    'varying vec2 vUv;',
    'uniform float u_time;',
    'uniform vec2 u_resolution;',
    '',
    'float PHI = 1.61803398874989484820459;',
    '',
    'float random(vec2 xy) {',
    '  return fract(tan(distance(xy * PHI, xy) * 0.5) * xy.x);',
    '}',
    '',
    'void main() {',
    '  vec2 st = vUv * u_resolution;',
    '  float totalSize = 20.0;',
    '  float dotSize = 3.0;',
    '',
    '  st.x -= abs(floor(mod(u_resolution.x, totalSize) - dotSize) * 0.5);',
    '  st.y -= abs(floor(mod(u_resolution.y, totalSize) - dotSize) * 0.5);',
    '',
    '  float opacity = step(0.0, st.x) * step(0.0, st.y);',
    '  vec2 gridPos = vec2(floor(st.x / totalSize), floor(st.y / totalSize));',
    '',
    '  float frequency = 5.0;',
    '  float showOffset = random(gridPos);',
    '  float rand = random(gridPos * floor((u_time / frequency) + showOffset + frequency));',
    '',
    '  float opacities[10];',
    '  opacities[0] = 0.06; opacities[1] = 0.06; opacities[2] = 0.06;',
    '  opacities[3] = 0.1; opacities[4] = 0.1; opacities[5] = 0.1;',
    '  opacities[6] = 0.16; opacities[7] = 0.16; opacities[8] = 0.16;',
    '  opacities[9] = 0.2;',
    '  opacity *= opacities[int(rand * 10.0)];',
    '',
    '  opacity *= 1.0 - step(dotSize / totalSize, fract(st.x / totalSize));',
    '  opacity *= 1.0 - step(dotSize / totalSize, fract(st.y / totalSize));',
    '',
    '  vec2 centerGrid = u_resolution / 2.0 / totalSize;',
    '  float dist = distance(centerGrid, gridPos);',
    '  float timing = dist * 0.01 + random(gridPos) * 0.15;',
    '  float speed = 0.5;',
    '  opacity *= step(timing, u_time * speed);',
    '  opacity *= clamp((1.0 - step(timing + 0.1, u_time * speed)) * 1.25, 1.0, 1.25);',
    '',
    '  gl_FragColor = vec4(vec3(1.0), opacity);',
    '}'
  ].join('\n');

  var material = new THREE.ShaderMaterial({
    vertexShader: vertexShader,
    fragmentShader: fragmentShader,
    uniforms: {
      u_time: { value: 0 },
      u_resolution: { value: new THREE.Vector2(w * renderer.getPixelRatio(), h * renderer.getPixelRatio()) }
    },
    transparent: true,
    blending: THREE.AdditiveBlending
  });

  var mesh = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), material);
  scene.add(mesh);

  var startTime = Date.now();

  function animate() {
    requestAnimationFrame(animate);
    material.uniforms.u_time.value = (Date.now() - startTime) / 1000;
    renderer.render(scene, camera);
  }
  animate();

  window.addEventListener('resize', function() {
    w = container.offsetWidth;
    h = container.offsetHeight;
    renderer.setSize(w, h);
    var pr = renderer.getPixelRatio();
    material.uniforms.u_resolution.value.set(w * pr, h * pr);
  });
  } catch(e) { console.warn('WebGL not available:', e.message); }
})();

/* ── Auth actions ── */
function showSpinner(btn) {
  btn._origText = btn.textContent;
  btn.disabled = true;
  btn.textContent = '';
  var s = document.createElement('div');
  s.className = 'auth-spinner';
  btn.appendChild(s);
  // Recovery timeout: restore button after 8s if redirect fails
  btn._recoveryTimer = setTimeout(function() {
    btn.disabled = false;
    btn.textContent = btn._origText || 'Войти';
    var err = document.getElementById('authError');
    if (err) { err.textContent = 'Не удалось подключиться. Попробуйте ещё раз.'; err.style.display = 'block'; }
  }, 8000);
}

function authLogin() {
  var email = document.getElementById('authEmail').value.trim();
  var err = document.getElementById('authError');
  if (err) { err.style.display = 'none'; err.textContent = ''; }
  if (!email) {
    if (err) { err.textContent = 'Введите email'; err.style.display = 'block'; }
    document.getElementById('authEmail').focus();
    return;
  }
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    if (err) { err.textContent = 'Проверьте формат email'; err.style.display = 'block'; }
    document.getElementById('authEmail').focus();
    return;
  }
  showSpinner(document.getElementById('btnLogin'));
  setTimeout(function() {
    window.location.href = 'https://app.agineai.com/login';
  }, 900);
}

function authSocial(btn) {
  var provider = btn.getAttribute('data-provider') || 'google';
  btn.style.opacity = '0.5';
  btn.style.pointerEvents = 'none';
  // Recovery after 5s in case redirect fails
  setTimeout(function() {
    btn.style.opacity = '1';
    btn.style.pointerEvents = 'auto';
  }, 5000);
  // Redirect to app login page with provider parameter — triggers Supabase OAuth
  window.location.href = 'https://app.agineai.com/login?provider=' + encodeURIComponent(provider);
}

function authTest() {
  var btn = document.getElementById('btnTest');
  btn.style.color = '#0a0a0a';
  btn.style.pointerEvents = 'none';
  setTimeout(function() {
    window.location.href = '/platform.html';
  }, 600);
}

// Enter key submits login
document.getElementById('authEmail').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') { e.preventDefault(); authLogin(); }
});
</script>
